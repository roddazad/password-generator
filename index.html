<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  
    <div class="container">
        <h1>Password Generator</h1>
        <form id="passwordForm">
            <label for="length">Password Length:</label>
            <input type="number" id="length" name="length" min="8" max="128" value="" required>
            <label for="specialChars">
                <input type="checkbox" id="specialChars" name="specialChars"> Include Special Characters
            </label>
            <label for="upperCaseChars">
                <input type="checkbox" id="upperCaseChars" name="upperCaseChars" > Include Uppercase Letters
            </label>
            <label for="numbers">
                <input type="checkbox" id="numbers" name="numbers" > Include Numbers
            </label>
            <button type="submit">Generate Password</button>
        </form>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
